apiVersion: v1
kind: ConfigMap
metadata:
  name: school-erp-config
data:
  NODE_ENV: "production"
  PORT: "5000"
  # AWS RDS endpoint — set via Terraform output after provisioning
  # Format: <rds-endpoint>.rds.amazonaws.com
  DB_HOST: "RDS_ENDPOINT_PLACEHOLDER"
  DB_PORT: "3306"
  DB_NAME: "school_erp_main"
  # AWS ElastiCache Redis endpoint — set via Terraform output
  # Format: <cache-cluster>.cache.amazonaws.com
  REDIS_HOST: "ELASTICACHE_ENDPOINT_PLACEHOLDER"
  REDIS_PORT: "6379"
  UPLOAD_DIR: "/usr/src/app/uploads"
  MAX_FILE_SIZE_MB: "5"
  TENANT_SLUG: "PLACEHOLDER"
