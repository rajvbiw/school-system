apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: backend-exam-scaler
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: backend
  minReplicaCount: 2
  maxReplicaCount: 10
  triggers:
  - type: cron
    metadata:
      timezone: Asia/Kolkata
      start: "0 9 * * 1-6"   # 9 AM Mon-Sat (exam time)
      end: "0 14 * * 1-6"    # 2 PM
      desiredReplicas: "10"
