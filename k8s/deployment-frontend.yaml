apiVersion: apps/v1
kind: Deployment
metadata:
  name: school-erp-frontend
  labels:
    app: school-erp-frontend
    component: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: school-erp-frontend
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: school-erp-frontend
        component: frontend
        force-rollout: "true"
    spec:
      containers:
        - name: frontend
          image: FRONTEND_IMAGE_PLACEHOLDER:latest
          imagePullPolicy: Always
          env:
            - name: TENANT_SLUG
              valueFrom:
                configMapKeyRef:
                  name: school-erp-config
                  key: TENANT_SLUG
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          resources:
            requests:
              cpu: "20m"
              memory: "32Mi"
            limits:
              cpu: "100m"
              memory: "64Mi"
          livenessProbe:
            httpGet:
              path: /nginx-health
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 20
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /nginx-health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
      terminationGracePeriodSeconds: 15

---
apiVersion: v1
kind: Service
metadata:
  name: school-erp-frontend
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
spec:
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
  selector:
    app: school-erp-frontend
  type: LoadBalancer
