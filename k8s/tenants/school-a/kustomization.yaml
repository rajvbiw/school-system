apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: school-a

resources:
- ../../base

patches:
- patch: |-
    - op: replace
      path: /metadata/namespace
      value: school-a
  target:
    kind: Deployment

commonLabels:
  tenant: school-a

configMapGenerator:
- name: tenant-config
  behavior: merge
  literals:
  - TENANT_SLUG=school-a
  - TENANT_NAME="Springfield Academy"
