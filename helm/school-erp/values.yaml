replicaCount: 2

image:
  backend:
    repository: "AWS_ACCOUNT_ID.dkr.ecr.AWS_REGION.amazonaws.com/school-erp-backend"
    tag: "latest"
    pullPolicy: "Always"
  frontend:
    repository: "AWS_ACCOUNT_ID.dkr.ecr.AWS_REGION.amazonaws.com/school-erp-frontend"
    tag: "latest"
    pullPolicy: "Always"

tenant:
  slug: "school-a"
  name: "Springfield Academy"
  primaryColor: "#3B82F6"

ingress:
  host: "school-a.edtech.example.com"
  acmCertArn: "ACM_CERT_ARN_PLACEHOLDER"

mysql:
  host: "RDS_ENDPOINT_PLACEHOLDER"
  database: "school_a_db"
  port: 3306

redis:
  host: "ELASTICACHE_ENDPOINT_PLACEHOLDER"
  port: 6379

s3:
  bucket: "school-erp-uploads"
  region: "us-east-1"

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

resources:
  backend:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  frontend:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "200m"
      memory: "128Mi"
