apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "school-erp.fullname" . }}-backend
  labels:
    {{- include "school-erp.labels" . | nindent 4 }}
    component: backend
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "school-erp.selectorLabels" . | nindent 6 }}
      component: backend
  template:
    metadata:
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "5000"
      labels:
        {{- include "school-erp.selectorLabels" . | nindent 8 }}
        component: backend
    spec:
      serviceAccountName: {{ include "school-erp.fullname" . }}-sa
      containers:
      - name: backend
        image: "{{ .Values.image.backend.repository }}:{{ .Values.image.backend.tag }}"
        imagePullPolicy: {{ .Values.image.backend.pullPolicy }}
        ports:
        - containerPort: 5000
        resources:
          {{- toYaml .Values.resources.backend | nindent 10 }}
        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 5000
          initialDelaySeconds: 10
          periodSeconds: 5
        envFrom:
        - configMapRef:
            name: {{ include "school-erp.fullname" . }}-config
        - secretRef:
            name: {{ include "school-erp.fullname" . }}-secret
        lifecycle:
          preStop:
            exec:
              command: ["sleep", "5"]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "school-erp.fullname" . }}-frontend
  labels:
    {{- include "school-erp.labels" . | nindent 4 }}
    component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      {{- include "school-erp.selectorLabels" . | nindent 6 }}
      component: frontend
  template:
    metadata:
      labels:
        {{- include "school-erp.selectorLabels" . | nindent 8 }}
        component: frontend
    spec:
      containers:
      - name: frontend
        image: "{{ .Values.image.frontend.repository }}:{{ .Values.image.frontend.tag }}"
        imagePullPolicy: {{ .Values.image.frontend.pullPolicy }}
        ports:
        - containerPort: 80
        resources:
          {{- toYaml .Values.resources.frontend | nindent 10 }}
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 15
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 10
