apiVersion: v1
kind: Service
metadata:
  name: {{ include "school-erp.fullname" . }}-backend
  labels:
    {{- include "school-erp.labels" . | nindent 4 }}
    component: backend
spec:
  ports:
  - port: 5000
    targetPort: 5000
    protocol: TCP
  selector:
    {{- include "school-erp.selectorLabels" . | nindent 4 }}
    component: backend
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "school-erp.fullname" . }}-frontend
  labels:
    {{- include "school-erp.labels" . | nindent 4 }}
    component: frontend
spec:
  ports:
  - port: 80
    targetPort: 80
    protocol: TCP
  selector:
    {{- include "school-erp.selectorLabels" . | nindent 4 }}
    component: frontend
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "school-erp.fullname" . }}-frontend-lb
  labels:
    {{- include "school-erp.labels" . | nindent 4 }}
    component: frontend-lb
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
spec:
  ports:
  - port: 80
    targetPort: 80
    protocol: TCP
  selector:
    {{- include "school-erp.selectorLabels" . | nindent 4 }}
    component: frontend
  type: LoadBalancer
