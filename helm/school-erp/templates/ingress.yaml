apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "school-erp.fullname" . }}-ingress
  labels:
    {{- include "school-erp.labels" . | nindent 4 }}
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/certificate-arn: {{ .Values.ingress.acmCertArn | quote }}
    alb.ingress.kubernetes.io/ssl-redirect: "443"
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80},{"HTTPS":443}]'
spec:
  rules:
  - host: {{ .Values.ingress.host | quote }}
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: {{ include "school-erp.fullname" . }}-backend
            port:
              number: 5000
      - path: /socket.io
        pathType: Prefix
        backend:
          service:
            name: {{ include "school-erp.fullname" . }}-backend
            port:
              number: 5000
      - path: /
        pathType: Prefix
        backend:
          service:
            name: {{ include "school-erp.fullname" . }}-frontend
            port:
              number: 80
