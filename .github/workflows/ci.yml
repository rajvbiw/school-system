name: CI / CD – Terraform + Build + Deploy

on:
  push:
    branches: [main]
    paths:
      - 'terraform/**'
      - 'helm/**'
      - 'backend/**'
      - 'frontend/**'
  workflow_dispatch:

env:
  TF_VERSION: "1.9.5"
  TF_WORKING_DIR: "./terraform"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      # ----- Checkout -------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # ----- AWS credentials via OIDC ---------------------------------
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}
          audience: sts.amazonaws.com
          output-env-credentials: true

      # ----- Terraform -------------------------------------------------
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform -chdir=${{ env.TF_WORKING_DIR }} init

      - name: Terraform Apply (auto‑approve)
        run: terraform -chdir=${{ env.TF_WORKING_DIR }} apply -auto-approve

      # ----- Capture outputs for later steps -------------------------
      - name: Export TF outputs
        id: tf
        run: |
          echo "EKS_NAME=$(terraform -chdir=${{ env.TF_WORKING_DIR }} output -raw eks_cluster_name)" >> $GITHUB_OUTPUT
          echo "ECR_BACKEND=$(terraform -chdir=${{ env.TF_WORKING_DIR }} output -raw ecr_backend_url)" >> $GITHUB_OUTPUT
          echo "ECR_FRONTEND=$(terraform -chdir=${{ env.TF_WORKING_DIR }} output -raw ecr_frontend_url)" >> $GITHUB_OUTPUT

      # ----- Login to ECR --------------------------------------------
      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      # ----- Build & push Backend image -------------------------------
      - name: Build & push Backend image
        env:
          REPO: ${{ steps.ecr-login.outputs.registry }}/school-erp-backend
          TAG: ${{ github.sha }}
        run: |
          docker build -f backend/Dockerfile -t $REPO:$TAG .
          docker push $REPO:$TAG

      # ----- Build & push Frontend image ------------------------------
      - name: Build & push Frontend image
        env:
          REPO: ${{ steps.ecr-login.outputs.registry }}/school-erp-frontend
          TAG: ${{ github.sha }}
        run: |
          docker build -f frontend/Dockerfile -t $REPO:$TAG .
          docker push $REPO:$TAG

      # ----- Patch Helm values (image tags + ingress host) ------------
      - name: Update Helm values.yaml
        run: |
          yq eval ".backend.image.repository = \"${{ steps.ecr-login.outputs.registry }}/school-erp-backend\" |
                  .backend.image.tag = \"${{ github.sha }}\" |
                  .frontend.image.repository = \"${{ steps.ecr-login.outputs.registry }}/school-erp-frontend\" |
                  .frontend.image.tag = \"${{ github.sha }}\" |
                  .ingress.host = \"${{ secrets.INGRESS_HOST }}\"" -i helm/school-erp/values.yaml

      # ----- Update kubeconfig for the new EKS cluster ----------------
      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --name ${{ steps.tf.outputs.EKS_NAME }} --region ${{ secrets.AWS_REGION }}

      # ----- Deploy/Upgrade Helm chart --------------------------------
      - name: Deploy Helm chart
        run: |
          helm upgrade --install school-erp ./helm/school-erp \
            --namespace erp --create-namespace \
            -f ./helm/school-erp/values.yaml
